name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (base + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      # Formatting is now a gate (the codebase is black-clean). Type checking
      # still has a backlog, so mypy reports without failing the build; flip
      # its continue-on-error off once the debt is cleared.
      - name: Check formatting (black)
        run: black --check src tests

      - name: Type check (mypy)
        run: mypy src
        continue-on-error: true
